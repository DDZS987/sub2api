services:
  # 仅在目标机预演中修正 Redis 持久化参数。
  redis:
    command:
      - sh
      - -ec
      - |
        if [ -n "$${REDISCLI_AUTH:-}" ]; then
          exec redis-server \
            --save 60 1 \
            --appendonly yes \
            --appendfsync everysec \
            --requirepass "$${REDISCLI_AUTH}"
        fi
        exec redis-server \
          --save 60 1 \
          --appendonly yes \
          --appendfsync everysec

  # 预演入口只绑定目标机回环地址，不接受任何公网请求。
  nginx:
    image: nginx:alpine
    container_name: sub2api-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./migration/nginx/sub2api.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      sub2api:
        condition: service_healthy
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  nginx_logs:
    driver: local
