services:
  postgres:
    shm_size: 256m
    command:
      - postgres
      - -c
      - shared_buffers=512MB
      - -c
      - effective_cache_size=3GB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - autovacuum_work_mem=64MB
      - -c
      - checkpoint_timeout=10min
      - -c
      - max_wal_size=2GB
      - -c
      - wal_compression=on
      - -c
      - jit=off
      - -c
      - idle_in_transaction_session_timeout=600000

  # 只在目标机修正 Redis 启动参数，避免前置准备改变旧机生产 Compose。
  redis:
    command:
      - sh
      - -ec
      - |
        if [ -n "$${REDISCLI_AUTH:-}" ]; then
          exec redis-server \
            --save 60 1 \
            --appendonly yes \
            --appendfsync everysec \
            --requirepass "$${REDISCLI_AUTH}" \
            --maxmemory 512mb \
            --maxmemory-policy noeviction \
            --tcp-backlog 65535 \
            --tcp-keepalive 60 \
            --lazyfree-lazy-expire yes
        fi
        exec redis-server \
          --save 60 1 \
          --appendonly yes \
          --appendfsync everysec \
          --maxmemory 512mb \
          --maxmemory-policy noeviction \
          --tcp-backlog 65535 \
          --tcp-keepalive 60 \
          --lazyfree-lazy-expire yes

  # 目标机专用直连入口。证书由宿主机 Certbot 通过 HTTP-01 自动续期。
  nginx:
    image: nginx:alpine
    container_name: sub2api-nginx
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    stop_grace_period: 30s
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./migration/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./migration/nginx/sub2api.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      sub2api:
        condition: service_healthy
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  sing-box-vless:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: sub2api-sing-box-vless
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    command: ["run", "-c", "/etc/sing-box/config.json"]
    volumes:
      - ../.dev/sing-box/config.json:/etc/sing-box/config.json:ro
    ports:
      - "127.0.0.1:10808:10808"
      - "127.0.0.1:10809:10809"
      - "0.0.0.0:24443-24472:24443-24472"
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "sing-box", "check", "-c", "/etc/sing-box/config.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  vless-relay-sub:
    image: nginx:alpine
    container_name: sub2api-vless-relay-sub
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    pids_limit: 256
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    volumes:
      - ../.dev/vless-relay/sub:/usr/share/nginx/html:ro
    ports:
      - "0.0.0.0:24480:80"
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/index.html || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  nginx_logs:
    driver: local
