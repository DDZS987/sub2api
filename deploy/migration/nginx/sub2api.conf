map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_conn_zone $binary_remote_addr zone=per_ip_connections:10m;
limit_req_zone $binary_remote_addr zone=auth_requests:10m rate=10r/m;

server {
    listen 80;
    server_name fyai.space api.fyai.space;

    # Let's Encrypt HTTP-01 challenge. The host's /etc/letsencrypt is mounted
    # read-only in this container, while Certbot writes the challenge file on
    # the host.
    location ^~ /.well-known/acme-challenge/ {
        root /etc/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name www.fyai.space;

    location ^~ /.well-known/acme-challenge/ {
        root /etc/letsencrypt;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://fyai.space$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name fyai.space api.fyai.space;

    ssl_certificate /etc/letsencrypt/live/fyai.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fyai.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:TLS:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    server_tokens off;
    client_max_body_size 100m;
    limit_conn per_ip_connections 50;

    access_log /dev/stdout;
    error_log /dev/stderr;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    resolver 127.0.0.11 valid=10s ipv6=off;
    set $sub2api_upstream sub2api:8080;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /register {
        return 404;
    }

    location = /forgot-password {
        return 404;
    }

    location = /reset-password {
        return 404;
    }

    location = /api/v1/auth/register {
        return 403;
    }

    location = /api/v1/auth/send-verify-code {
        return 403;
    }

    location = /api/v1/auth/forgot-password {
        return 403;
    }

    location = /api/v1/auth/reset-password {
        return 403;
    }

    location ~ ^/api/v1/auth/oauth/[^/]+/(complete-registration|create-account)$ {
        return 403;
    }

    location = /api/v1/auth/login {
        limit_req zone=auth_requests burst=10 nodelay;
        proxy_pass http://$sub2api_upstream;
    }

    location / {
        proxy_pass http://$sub2api_upstream;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name www.fyai.space;

    ssl_certificate /etc/letsencrypt/live/fyai.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fyai.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 308 https://fyai.space$request_uri;
}
